<header class="coer-page-title" title=''>
    <h2>
        <span> {{ title() }} </span>

        <!-- Button Information -->
        @if(information().show) {
            <coer-button
                type="icon-rounded"
                icon="i91-circle-info font-size-17px" 
                minWidth="17px"
                maxWidth="17px"
                minHeight="17px"
                maxHeight="17px"
                (onClick)="onClickInformation.emit()"
            ></coer-button>
            <!-- <button 
                #infoButton
                mat-icon-button
                [matTooltip]="_tooltip()"
                matTooltipPosition="before"
                [matTooltipDisabled]="false"
                [matTooltipHideDelay]="0"
                type="button"
                (click)="_ClickInformation()">
                <i class="icon-circle-info"></i>
            </button> -->
        }
    </h2>

    <!-- Navigation -->
    @if(showBreadcrumbs()) {
        <nav>   
            <a class="breadcrumb-root" draggable="false">
                <i [class]="_iconRoot"></i>
            </a>
             
            <!-- Breadcrumbs -->
            <div class="breadcrumbs">  
                @for(breadcrumb of _breadcrumbs().setIndex(); track breadcrumb.index) {
                    <span>/</span>
                    <a [routerLink]='(breadcrumb.path && breadcrumb.path.length > 0) ? breadcrumb.path : null'
                       [queryParams]='breadcrumb.queryParams' 
                       (click)="(breadcrumb.click) ? breadcrumb.click() : null"
                       draggable="false">
                       {{ breadcrumb.page }}
                   </a>
                }               
            </div>
            

            <!-- Go Back -->
            @if(_showGoBack()) {
                <a  class="go-back"
                    [routerLink]="goBack().path"
                    [queryParams]='goBack().queryParams'
                    (click)="(goBack().click) ? goBack().click!() : null"
                    draggable="false">
                    <i class="i91-reply font-size-20px"></i>
                </a> 
            }
        </nav>
    }
</header>
