@switch(input) {
    @case ('coer-switch') {
        <div class="input-coer-switch">
            <coer-switch
                #coerSwitch
                [id]="id()"
                [ngModel]="row()[column().config.property]"
                [isReadonly]="_switchAttributes()?.isReadonly || false" 
                [type]="_switchAttributes()?.type || 'switch'"
                [tooltip]="_switchAttributes()?.tooltip || ''"
                [tooltipPosition]="_switchAttributes()?.tooltipPosition || 'left'"
                marginLeft="auto"
                marginRight="auto"
                [isLoading]="isLoading()"
                (onInput)="onSwitchChange.emit({ 
                    indexRow: row().indexRow,  
                    property: column().config.property, 
                    row: row(), 
                    value: $event 
                })"
            ></coer-switch>
        </div>
    }

    @case ('coer-textbox') {
        
    }

    @case ('coer-numberbox') {
         
    }

    @case ('coer-selectbox') {
         
    }


    @case ('coer-datebox') {
        
    }

    @default {
        <div class="default-cell" 
            [ngStyle]="{
                'justify-content': _GetTextAlignX(),
                'word-break'     : _GetTextBreak(),
                'white-space'    : _GetSpaceBreak(),
                'min-height'     : minHeight()  
            }"
            (click)="isEnabled() ? onClickRow.emit(row()) : null"
            (dblclick)="isEnabled() ? onDoubleClickRow.emit(row()) : null">  
            <div [innerHTML]="_GetCellValue() | html" class="display-flex"></div>          
        </div>
    }
}
